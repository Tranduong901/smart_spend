name: smart_spend
description: Ứng dụng quản lý chi tiêu Smart Spend.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  fl_chart: ^0.69.0
  provider: ^6.1.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  path: ^1.9.1
  http: ^1.3.0
  pdf: ^3.12.0
  csv: ^6.0.0
  uuid: ^4.0.0
  intl: 0.20.2
  google_fonts: ^6.1.0
  open_filex: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/fonts/static/
    - assets/fonts/
    - assets/
